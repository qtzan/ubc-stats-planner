<!-- Login / Sign up modal -->
<div id="auth-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
	<div class="bg-white rounded-lg p-6 w-full max-w-sm relative">
		<button id="auth-modal-close" class="absolute top-2 right-3 text-gray-500 hover:text-[#0f1b3d] text-xl leading-none cursor-pointer">&times;</button>

		<p id="auth-modal-prompt" class="hidden text-sm text-gray-700 mb-3">
			Please log in or sign up to continue.
		</p>
		<p id="auth-error" class="hidden text-sm text-red-600 mb-3"></p>

		<form id="login-form" class="flex flex-col gap-y-2">
			<h2 class="text-lg font-bold text-[#0f1b3d] mb-1">Log In</h2>
			<input type="email" name="email" placeholder="Email" required class="border border-gray-300 rounded p-2 text-sm">
			<input type="password" name="password" placeholder="Password" required class="border border-gray-300 rounded p-2 text-sm">
			<button type="submit" class="rounded-full py-2 px-4 text-sm font-semibold bg-blue-600 hover:bg-blue-700 text-white cursor-pointer">Log In</button>
			<p class="text-sm text-gray-700">
				Need an account?
				<span id="switch-to-signup" class="text-blue-700 underline cursor-pointer">Sign up</span>
			</p>
		</form>

		<form id="signup-form" class="hidden flex flex-col gap-y-2">
			<h2 class="text-lg font-bold text-[#0f1b3d] mb-1">Sign Up</h2>
			<input type="text" name="name" placeholder="Full name" required class="border border-gray-300 rounded p-2 text-sm">
			<input type="email" name="email" placeholder="Email" required class="border border-gray-300 rounded p-2 text-sm">
			<input type="password" name="password" placeholder="Password" required class="border border-gray-300 rounded p-2 text-sm">
			<select name="year_level" required class="border border-gray-300 rounded p-2 text-sm text-[#0f1b3d]">
				<option value="" disabled selected>Year level</option>
				<option>1st Year</option>
				<option>2nd Year</option>
				<option>3rd Year</option>
				<option>4th Year</option>
				<option>5th+ Year</option>
			</select>
			<input type="text" name="major" placeholder="Major" required class="border border-gray-300 rounded p-2 text-sm">
			<button type="submit" class="rounded-full py-2 px-4 text-sm font-semibold bg-blue-600 hover:bg-blue-700 text-white cursor-pointer">Sign Up</button>
			<p class="text-sm text-gray-700">
				Already have an account?
				<span id="switch-to-login" class="text-blue-700 underline cursor-pointer">Log in</span>
			</p>
		</form>
	</div>
</div>
