{% if current_user %}
	<span class="text-sm text-[#0f1b3d] whitespace-nowrap">Hi, {{ current_user.name }}</span>
	<button
		id="logout-btn"
		class="rounded-full py-2 px-4 text-sm font-semibold cursor-pointer bg-gray-200 hover:bg-gray-300 text-[#0f1b3d] whitespace-nowrap"
	>
		Log Out
	</button>
{% else %}
	<button
		id="show-login-btn"
		class="rounded-full py-2 px-4 text-sm font-semibold cursor-pointer bg-gray-200 hover:bg-gray-300 text-[#0f1b3d] whitespace-nowrap"
	>
		Log In
	</button>
	<button
		id="show-signup-btn"
		class="rounded-full py-2 px-4 text-sm font-semibold cursor-pointer bg-blue-600 hover:bg-blue-700 text-white whitespace-nowrap"
	>
		Sign Up
	</button>
{% endif %}
